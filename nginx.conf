server {
    listen 80;
    resolver 10.96.0.10 valid=10s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # JMAP proxy → polyon-core /jmap-proxy
    location /jmap-proxy/ {
        set $upstream_core http://polyon-core.polyon.svc.cluster.local:8000;
        proxy_pass $upstream_core;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        # SSE / EventSource support
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API proxy → polyon-core
    location /api/ {
        set $upstream_api http://polyon-core.polyon.svc.cluster.local:8000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Keycloak Auth proxy
    location /auth/ {
        set $upstream_kc http://polyon-auth.polyon.svc.cluster.local:8080;
        proxy_pass $upstream_kc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Module iframe proxy — Drive (사원 UI)
    location /modules/drive/ {
        set $upstream_drive http://polyon-drive.polyon.svc.cluster.local:8080;
        rewrite ^/modules/drive/(.*)$ /$1 break;
        proxy_pass $upstream_drive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
