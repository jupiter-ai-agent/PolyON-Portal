name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from VERSION file
        id: version
        run: |
          # 이 리포에 VERSION 파일이 있으면 우선 사용, 없으면 PolyON-Operator에서 읽기
          if [ -f VERSION ]; then
            VER=$(grep "^portal=" VERSION | cut -d= -f2)
          else
            VER=$(curl -sf https://raw.githubusercontent.com/jupiter-ai-agent/PolyON-Operator/main/VERSION | grep "^portal=" | cut -d= -f2)
          fi
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Image version: ${VER}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            jupitertriangles/polyon-portal:v${{ steps.version.outputs.version }}
