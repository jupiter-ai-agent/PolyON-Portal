<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyON Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #161616;
      color: #f4f4f4;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #262626;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      border-bottom: 1px solid #393939;
    }
    .header__brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .header__brand svg { width: 20px; height: 20px; fill: #78a9ff; }
    .header__user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
    }
    .header__user-name { color: #c6c6c6; }
    .header__logout {
      background: none;
      border: 1px solid #6f6f6f;
      color: #c6c6c6;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
    }
    .header__logout:hover { background: #393939; }

    /* Hero */
    .hero {
      padding: 3rem 2rem 2rem;
      text-align: center;
    }
    .hero__greeting {
      font-size: 1.75rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    .hero__subtitle {
      font-size: 0.875rem;
      color: #a8a8a8;
    }

    /* Apps Grid */
    .apps {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .app-card {
      background: #262626;
      border: 1px solid #393939;
      border-radius: 4px;
      padding: 1.25rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .app-card:hover {
      background: #333;
      border-color: #525252;
    }
    .app-card__icon {
      width: 32px;
      height: 32px;
      background: #0f62fe;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
      font-size: 1rem;
      color: white;
    }
    .app-card__name {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .app-card__desc {
      font-size: 0.75rem;
      color: #a8a8a8;
      line-height: 1.4;
    }
    .app-card__domain {
      font-size: 0.6875rem;
      color: #6f6f6f;
      margin-top: 0.5rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Auth screen */
    .auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 1.5rem;
    }
    .auth-screen__title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    .auth-screen__btn {
      background: #0f62fe;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
    }
    .auth-screen__btn:hover { background: #0353e9; }
    .auth-screen__error {
      color: #fa4d56;
      font-size: 0.8125rem;
      max-width: 400px;
      text-align: center;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #a8a8a8;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ── Config ─────────────────────────────────────────────────────────────
    let authConfig = null;
    let userInfo = null;
    let apps = [];

    // ── Init ──────────────────────────────────────────────────────────────
    async function init() {
      render('<div class="loading">로딩 중...</div>');

      // 1. Get auth config from Core API
      try {
        const res = await fetch('/api/v1/system/auth-config');
        if (!res.ok) throw new Error('auth-config 조회 실패');
        authConfig = await res.json();
        // Portal uses polyon realm (not admin)
        authConfig.realm = 'polyon';
        authConfig.client_id = 'polyon-portal';
      } catch (err) {
        renderError('인증 서버 설정을 불러올 수 없습니다: ' + err.message);
        return;
      }

      // 2. Check if we have a code in URL (OIDC callback)
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      if (code) {
        await handleCallback(code);
        return;
      }

      // 3. Check existing token
      const token = sessionStorage.getItem('portal_token');
      if (token) {
        try {
          userInfo = parseJwt(token);
          if (userInfo.exp * 1000 < Date.now()) {
            sessionStorage.removeItem('portal_token');
            redirectToLogin();
            return;
          }
          await loadApps(token);
          renderPortal();
          return;
        } catch {
          sessionStorage.removeItem('portal_token');
        }
      }

      // 4. Not authenticated — 바로 Keycloak 로그인으로 리다이렉트
      redirectToLogin();
    }

    // ── OIDC ──────────────────────────────────────────────────────────────
    function redirectToLogin() {
      const state = crypto.randomUUID();
      sessionStorage.setItem('oidc_state', state);

      const codeVerifier = generateCodeVerifier();
      sessionStorage.setItem('oidc_verifier', codeVerifier);

      generateCodeChallenge(codeVerifier).then(challenge => {
        const url = `${authConfig.keycloak_url}/realms/${authConfig.realm}/protocol/openid-connect/auth`
          + `?client_id=${authConfig.client_id}`
          + `&redirect_uri=${encodeURIComponent(window.location.origin + '/')}`
          + `&response_type=code`
          + `&scope=openid profile email`
          + `&state=${state}`
          + `&code_challenge=${challenge}`
          + `&code_challenge_method=S256`;
        window.location.href = url;
      });
    }

    async function handleCallback(code) {
      const verifier = sessionStorage.getItem('oidc_verifier');
      if (!verifier) {
        renderError('인증 세션이 만료되었습니다. 다시 시도해주세요.');
        return;
      }

      try {
        const tokenUrl = `${authConfig.keycloak_url}/realms/${authConfig.realm}/protocol/openid-connect/token`;
        const res = await fetch(tokenUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            client_id: authConfig.client_id,
            code: code,
            redirect_uri: window.location.origin + '/',
            code_verifier: verifier,
          }),
        });

        if (!res.ok) throw new Error('토큰 교환 실패');

        const data = await res.json();
        sessionStorage.setItem('portal_token', data.access_token);
        sessionStorage.removeItem('oidc_verifier');
        sessionStorage.removeItem('oidc_state');

        userInfo = parseJwt(data.access_token);
        window.history.replaceState({}, '', '/');
        await loadApps(data.access_token);
        renderPortal();
      } catch (err) {
        renderError('로그인 처리 중 오류: ' + err.message);
      }
    }

    // ── PKCE helpers ──────────────────────────────────────────────────────
    function generateCodeVerifier() {
      const arr = new Uint8Array(32);
      crypto.getRandomValues(arr);
      return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const data = new TextEncoder().encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function parseJwt(token) {
      const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      // UTF-8 safe decode (atob returns Latin-1, need to handle multi-byte)
      const raw = atob(base64);
      const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    // ── Load apps ─────────────────────────────────────────────────────────
    async function loadApps(token) {
      try {
        const res = await fetch('/api/v1/apps', {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.ok) {
          const data = await res.json();
          const list = data.apps || data || [];
          // Show installed/active apps (subdomain or URL pattern)
          apps = list.filter(a =>
            (a.subdomain || a.pathPrefix || a.path_prefix) &&
            (a.base_status === 'active' || a.baseStatus === 'active' ||
             a.base_status === 'installed' || a.base_status === 'requires-setup')
          );
        }
      } catch { /* ignore */ }
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function render(html) {
      document.getElementById('app').innerHTML = html;
    }

    function renderLogin() {
      render(`
        <div class="auth-screen">
          <svg width="48" height="48" viewBox="0 0 32 32" fill="#0f62fe">
            <circle cx="16" cy="16" r="14" fill="none" stroke="#0f62fe" stroke-width="2"/>
            <text x="16" y="21" text-anchor="middle" font-size="14" font-weight="600" fill="#0f62fe">P</text>
          </svg>
          <div class="auth-screen__title">PolyON Portal</div>
          <button class="auth-screen__btn" onclick="redirectToLogin()">로그인</button>
        </div>
      `);
    }

    function renderError(msg) {
      render(`
        <div class="auth-screen">
          <div class="auth-screen__title">오류</div>
          <div class="auth-screen__error">${msg}</div>
          <button class="auth-screen__btn" onclick="location.reload()">다시 시도</button>
        </div>
      `);
    }

    function renderPortal() {
      const name = userInfo?.name || userInfo?.preferred_username || '사용자';
      const hour = new Date().getHours();
      const greeting = hour < 12 ? '좋은 아침입니다' : hour < 18 ? '좋은 오후입니다' : '좋은 저녁입니다';

      // Get base domain from first app or fallback
      const baseDomain = window.location.hostname.split('.').slice(1).join('.') || 'cmars.com';

      const appIcons = {
        mail: 'M', chat: 'C', documents: 'D', wiki: 'W', calendar: 'A',
        approval: 'A', hr: 'H', board: 'B', bpmn: 'P', automation: 'N',
        vault: 'V', sso: 'S', forms: 'F', note: 'N', homepage: 'H',
      };

      const appColors = {
        mail: '#da1e28', chat: '#0f62fe', documents: '#198038', wiki: '#8a3ffc',
        calendar: '#ff832b', approval: '#002d9c', hr: '#a56eff', board: '#005d5d',
      };

      const portalHost = window.location.hostname;
      const cardsHtml = apps.map(app => {
        const icon = appIcons[app.id] || app.name?.charAt(0)?.toUpperCase() || '?';
        const color = appColors[app.id] || '#0f62fe';
        const accessMode = app.accessMode || app.access_mode || 'subdomain';
        const pathPrefix = app.pathPrefix || app.path_prefix || '';
        let url, displayDomain;
        if (accessMode === 'url' && pathPrefix) {
          url = `https://${portalHost}${pathPrefix}`;
          displayDomain = `${portalHost}${pathPrefix}`;
        } else if (app.subdomain) {
          url = `https://${app.subdomain}.${baseDomain}`;
          displayDomain = `${app.subdomain}.${baseDomain}`;
        } else {
          url = '#';
          displayDomain = '미설정';
        }
        return `
          <a class="app-card" href="${url}" ${url !== '#' ? '' : ''}>
            <div class="app-card__icon" style="background:${color}">${icon}</div>
            <div class="app-card__name">${app.name || app.id}</div>
            <div class="app-card__desc">${app.desc || ''}</div>
            <div class="app-card__domain">${displayDomain}</div>
          </a>
        `;
      }).join('');

      render(`
        <div class="header">
          <div class="header__brand">
            <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="#78a9ff" stroke-width="2"/><text x="16" y="21" text-anchor="middle" font-size="14" font-weight="600" fill="#78a9ff">P</text></svg>
            PolyON
          </div>
          <div class="header__user">
            <span class="header__user-name">${name}</span>
            <button class="header__logout" onclick="logout()">로그아웃</button>
          </div>
        </div>
        <div class="hero">
          <div class="hero__greeting">${greeting}, ${name}님</div>
          <div class="hero__subtitle">서비스를 선택하세요</div>
        </div>
        <div class="apps">
          ${cardsHtml || '<p style="color:#a8a8a8;grid-column:1/-1;text-align:center">설치된 서비스가 없습니다</p>'}
        </div>
      `);
    }

    function logout() {
      const token = sessionStorage.getItem('portal_token');
      sessionStorage.clear();
      if (authConfig && token) {
        const idToken = token; // simplified
        const url = `${authConfig.keycloak_url}/realms/${authConfig.realm}/protocol/openid-connect/logout`
          + `?client_id=${authConfig.client_id}`
          + `&post_logout_redirect_uri=${encodeURIComponent(window.location.origin + '/')}`;
        window.location.href = url;
      } else {
        location.reload();
      }
    }

    // ── Start ─────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
